services:
  queenbee:
    container_name: queenbee
    image: queenbee
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:3000"
    env_file:
      - .env
    environment:
      - TZ=Europe/Oslo
    networks:
      - workerbee_default
      - beekeeper_default
      - tekkom_bot_default
    mem_limit: 1g
    cpus: "2.0"

networks:
  workerbee_default:
    external: true
  beekeeper_default:
    external: true
  tekkom_bot_default:
    external: true
