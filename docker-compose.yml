services:
  queenbee:
    container_name: queenbee
    image: queenbee
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8000:3000'
    env_file:
      - .env
    networks:
      - workerbee_default
    mem_limit: 1g
    cpus: "2.0"

networks:
  workerbee_default:
    external: true
