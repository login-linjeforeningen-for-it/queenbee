---
stages:
    - build
    - trigger-stages

build:
    stage: build
    image:
        name: gcr.io/kaniko-project/executor:v1.20.1-debug
        entrypoint: ['']
    script:
        - |
            if [[ "$CI_COMMIT_TAG" =~ -dev$ ]]; then
              API_URL="https://dev.api.queenbee.login.no/v1"
              NEXT_PUBLIC_BROWSER_API="https://dev.api.queenbee.login.no/v1"
              TYPE=$TYPE
              PROJECT_ID=$PROJECT_ID
              PRIVATE_KEY_ID=$PRIVATE_KEY_ID
              PRIVATE_KEY=$PRIVATE_KEY
              CLIENT_EMAIL=$CLIENT_EMAIL
              CLIENT_ID=$CLIENT_ID
              AUTH_URI=$AUTH_URI
              TOKEN_URI=$TOKEN_URI
              AUTH_CERT_URL=$AUTH_CERT_URL
              CLIENT_CERT_URL=$CLIENT_CERT_URL
              UNIVERSE_DOMAIN=$UNIVERSE_DOMAIN
              GITLAB_MESSAGE="This variable is defined in the .gitlab-ci.yml file, then overridden by Kubernetes. Whatever is missing must be audited in both of those locations. (dev env)"
              echo "Building in development environment"
            else
              API_URL="https://api.queenbee.login.no/v1"
              NEXT_PUBLIC_BROWSER_API="https://api.queenbee.login.no/v1"
              TYPE=$TYPE
              PROJECT_ID=$PROJECT_ID
              PRIVATE_KEY_ID=$PRIVATE_KEY_ID
              PRIVATE_KEY=$PRIVATE_KEY
              CLIENT_EMAIL=$CLIENT_EMAIL
              CLIENT_ID=$CLIENT_ID
              AUTH_URI=$AUTH_URI
              TOKEN_URI=$TOKEN_URI
              AUTH_CERT_URL=$AUTH_CERT_URL
              CLIENT_CERT_URL=$CLIENT_CERT_URL
              UNIVERSE_DOMAIN=$UNIVERSE_DOMAIN
              GITLAB_MESSAGE="This variable is defined in the .gitlab-ci.yml file, then overridden by Kubernetes. Whatever is missing must be audited in both of those locations. (prod env)"
              echo "Building in production environment"
            fi
        - /kaniko/executor
          --context "${CI_PROJECT_DIR}"
          --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
          --build-arg "IMAGE_VERSION=${CI_COMMIT_TAG}"
          --build-arg "GITLAB_MESSAGE=${GITLAB_MESSAGE}"
          --build-arg "API_URL=${API_URL}"
          --build-arg "NEXT_PUBLIC_BROWSER_API=${NEXT_PUBLIC_BROWSER_API}"
          --build-arg "TYPE=${TYPE}"
          --build-arg "PROJECT_ID=${PROJECT_ID}"
          --build-arg "PRIVATE_KEY_ID=${PRIVATE_KEY_ID}"
          --build-arg "PRIVATE_KEY=${PRIVATE_KEY}"
          --build-arg "CLIENT_EMAIL=${CLIENT_EMAIL}"
          --build-arg "CLIENT_ID=${CLIENT_ID}"
          --build-arg "AUTH_URI=${AUTH_URI}"
          --build-arg "TOKEN_URI=${TOKEN_URI}"
          --build-arg "AUTH_CERT_URL=${AUTH_CERT_URL}"
          --build-arg "CLIENT_CERT_URL=${CLIENT_CERT_URL}"
          --build-arg "UNIVERSE_DOMAIN=${UNIVERSE_DOMAIN}"
          --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
    rules:
        - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/'
        - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+-dev$/'

trigger-stages:
    stage: trigger-stages
    trigger:
        project: tekkom/infrastructure/mend-renovate/mend-renovate-bot
        strategy: depend
        branch: main
    rules:
        - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/'
        - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+-dev$/'
